<svg viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1e2a3a">Common RAID levels</text>
  <!-- RAID 0 -->
  <text x="30" y="72" font-size="14" font-weight="700" fill="#2f6fed">RAID 0</text>
  <text x="30" y="90" font-size="11" fill="#5a6b80">Striping</text>
  <rect x="150" y="52" width="70" height="56" rx="6" fill="#e8f0ff" stroke="#2f6fed"/><text x="185" y="86" text-anchor="middle" font-size="13" fill="#1e2a3a">A1</text>
  <rect x="230" y="52" width="70" height="56" rx="6" fill="#e8f0ff" stroke="#2f6fed"/><text x="265" y="86" text-anchor="middle" font-size="13" fill="#1e2a3a">A2</text>
  <text x="470" y="84" font-size="12" fill="#5a6b80">Speed, capacity — no redundancy (any disk fails = all data lost)</text>
  <!-- RAID 1 -->
  <text x="30" y="156" font-size="14" font-weight="700" fill="#0f9d8f">RAID 1</text>
  <text x="30" y="174" font-size="11" fill="#5a6b80">Mirroring</text>
  <rect x="150" y="136" width="70" height="56" rx="6" fill="#e6f7f3" stroke="#0f9d8f"/><text x="185" y="170" text-anchor="middle" font-size="13" fill="#1e2a3a">A1</text>
  <rect x="230" y="136" width="70" height="56" rx="6" fill="#e6f7f3" stroke="#0f9d8f"/><text x="265" y="170" text-anchor="middle" font-size="13" fill="#1e2a3a">A1</text>
  <text x="470" y="168" font-size="12" fill="#5a6b80">Redundancy — one full copy on each disk</text>
  <!-- RAID 5 -->
  <text x="30" y="240" font-size="14" font-weight="700" fill="#c98a00">RAID 5</text>
  <text x="30" y="258" font-size="11" fill="#5a6b80">Stripe + parity</text>
  <rect x="150" y="220" width="70" height="56" rx="6" fill="#fff3da" stroke="#c98a00"/><text x="185" y="254" text-anchor="middle" font-size="13" fill="#1e2a3a">A1</text>
  <rect x="230" y="220" width="70" height="56" rx="6" fill="#fff3da" stroke="#c98a00"/><text x="265" y="254" text-anchor="middle" font-size="13" fill="#1e2a3a">A2</text>
  <rect x="310" y="220" width="70" height="56" rx="6" fill="#fbe6cf" stroke="#c98a00"/><text x="345" y="254" text-anchor="middle" font-size="13" fill="#1e2a3a">Ap</text>
  <text x="470" y="244" font-size="12" fill="#5a6b80">Redundancy + speed — 3+ disks, survives one failure</text>
  <text x="320" y="304" text-anchor="middle" font-size="11" fill="#5a6b80">RAID 10 mirrors a striped set (needs 4+ disks)</text>
</svg>
