<svg viewBox="0 0 660 280" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <text x="330" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1e2a3a">Multifactor authentication: factor categories</text>
  <rect x="30" y="55" width="190" height="150" rx="12" fill="#e8f0ff" stroke="#2f6fed"/>
  <text x="125" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1e2a3a">Something you</text>
  <text x="125" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#2f6fed">KNOW</text>
  <text x="125" y="140" text-anchor="middle" font-size="12" fill="#5a6b80">password</text>
  <text x="125" y="160" text-anchor="middle" font-size="12" fill="#5a6b80">PIN</text>
  <text x="125" y="180" text-anchor="middle" font-size="12" fill="#5a6b80">security question</text>
  <rect x="235" y="55" width="190" height="150" rx="12" fill="#e6f7f3" stroke="#0f9d8f"/>
  <text x="330" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1e2a3a">Something you</text>
  <text x="330" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#0f9d8f">HAVE</text>
  <text x="330" y="140" text-anchor="middle" font-size="12" fill="#5a6b80">phone / authenticator</text>
  <text x="330" y="160" text-anchor="middle" font-size="12" fill="#5a6b80">smart card</text>
  <text x="330" y="180" text-anchor="middle" font-size="12" fill="#5a6b80">hardware token</text>
  <rect x="440" y="55" width="190" height="150" rx="12" fill="#ede8ff" stroke="#7c5cff"/>
  <text x="535" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1e2a3a">Something you</text>
  <text x="535" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#7c5cff">ARE</text>
  <text x="535" y="140" text-anchor="middle" font-size="12" fill="#5a6b80">fingerprint</text>
  <text x="535" y="160" text-anchor="middle" font-size="12" fill="#5a6b80">face / iris</text>
  <text x="535" y="180" text-anchor="middle" font-size="12" fill="#5a6b80">voice</text>
  <text x="330" y="245" text-anchor="middle" font-size="13" fill="#1e2a3a">MFA requires factors from two or more <tspan font-weight="700">different</tspan> categories</text>
  <text x="330" y="266" text-anchor="middle" font-size="11" fill="#5a6b80">Two passwords are still one factor</text>
</svg>
