<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1e2a3a">Windows recovery (WinRE) — try least drastic first</text>
  <rect x="40" y="55" width="560" height="46" rx="10" fill="#e6f7f3" stroke="#0f9d8f"/>
  <text x="60" y="78" font-size="14" font-weight="700" fill="#1e2a3a">Startup Repair</text>
  <text x="60" y="94" font-size="11" fill="#5a6b80">automatically fixes missing or corrupt boot files</text>
  <rect x="40" y="109" width="560" height="46" rx="10" fill="#e8f0ff" stroke="#2f6fed"/>
  <text x="60" y="132" font-size="14" font-weight="700" fill="#1e2a3a">System Restore</text>
  <text x="60" y="148" font-size="11" fill="#5a6b80">rolls back system files/settings to an earlier restore point</text>
  <rect x="40" y="163" width="560" height="46" rx="10" fill="#ede8ff" stroke="#7c5cff"/>
  <text x="60" y="186" font-size="14" font-weight="700" fill="#1e2a3a">Safe Mode</text>
  <text x="60" y="202" font-size="11" fill="#5a6b80">boots minimal drivers so you can undo a bad update or driver</text>
  <rect x="40" y="217" width="560" height="46" rx="10" fill="#fbecea" stroke="#d4503e"/>
  <text x="60" y="240" font-size="14" font-weight="700" fill="#1e2a3a">Reset / reinstall</text>
  <text x="60" y="256" font-size="11" fill="#5a6b80">last resort — keep or remove files; back up data first</text>
  <path d="M610 78 L610 240" stroke="#5a6b80" stroke-dasharray="4 4"/>
  <text x="628" y="165" font-size="11" fill="#5a6b80" transform="rotate(90 628 165)">more drastic</text>
</svg>
