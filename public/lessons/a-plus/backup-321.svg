<svg viewBox="0 0 660 260" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <text x="330" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e2a3a">The 3-2-1 backup rule</text>
  <rect x="40" y="60" width="180" height="140" rx="14" fill="#e8f0ff" stroke="#2f6fed"/>
  <text x="130" y="120" text-anchor="middle" font-size="46" font-weight="800" fill="#2f6fed">3</text>
  <text x="130" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#1e2a3a">copies of data</text>
  <text x="130" y="172" text-anchor="middle" font-size="11" fill="#5a6b80">the original + 2 backups</text>
  <rect x="240" y="60" width="180" height="140" rx="14" fill="#e6f7f3" stroke="#0f9d8f"/>
  <text x="330" y="120" text-anchor="middle" font-size="46" font-weight="800" fill="#0f9d8f">2</text>
  <text x="330" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#1e2a3a">different media</text>
  <text x="330" y="172" text-anchor="middle" font-size="11" fill="#5a6b80">e.g. internal disk + NAS</text>
  <rect x="440" y="60" width="180" height="140" rx="14" fill="#ede8ff" stroke="#7c5cff"/>
  <text x="530" y="120" text-anchor="middle" font-size="46" font-weight="800" fill="#7c5cff">1</text>
  <text x="530" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#1e2a3a">copy off-site</text>
  <text x="530" y="172" text-anchor="middle" font-size="11" fill="#5a6b80">cloud or another location</text>
  <text x="330" y="232" text-anchor="middle" font-size="12" fill="#5a6b80">Off-site protects against fire, theft, and ransomware — and always test your restores</text>
</svg>
