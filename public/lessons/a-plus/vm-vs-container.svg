<svg viewBox="0 0 640 340" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <text x="320" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1e2a3a">Virtual machines vs. containers</text>
  <!-- VM stack -->
  <text x="160" y="58" text-anchor="middle" font-size="14" font-weight="700" fill="#2f6fed">Virtual machines</text>
  <rect x="40" y="70" width="110" height="40" rx="6" fill="#e8f0ff" stroke="#2f6fed"/><text x="95" y="95" text-anchor="middle" font-size="11" fill="#1e2a3a">App + Guest OS</text>
  <rect x="170" y="70" width="110" height="40" rx="6" fill="#e8f0ff" stroke="#2f6fed"/><text x="225" y="95" text-anchor="middle" font-size="11" fill="#1e2a3a">App + Guest OS</text>
  <rect x="40" y="116" width="240" height="38" rx="6" fill="#eef2f7" stroke="#5a6b80"/><text x="160" y="140" text-anchor="middle" font-size="12" fill="#1e2a3a">Hypervisor</text>
  <rect x="40" y="160" width="240" height="36" rx="6" fill="#dfe5ec" stroke="#5a6b80"/><text x="160" y="183" text-anchor="middle" font-size="12" fill="#1e2a3a">Host hardware</text>
  <text x="160" y="222" text-anchor="middle" font-size="11" fill="#5a6b80">Each VM ships a full OS — strong isolation, heavier</text>
  <!-- Container stack -->
  <text x="480" y="58" text-anchor="middle" font-size="14" font-weight="700" fill="#0f9d8f">Containers</text>
  <rect x="360" y="70" width="76" height="40" rx="6" fill="#e6f7f3" stroke="#0f9d8f"/><text x="398" y="95" text-anchor="middle" font-size="11" fill="#1e2a3a">App</text>
  <rect x="442" y="70" width="76" height="40" rx="6" fill="#e6f7f3" stroke="#0f9d8f"/><text x="480" y="95" text-anchor="middle" font-size="11" fill="#1e2a3a">App</text>
  <rect x="524" y="70" width="76" height="40" rx="6" fill="#e6f7f3" stroke="#0f9d8f"/><text x="562" y="95" text-anchor="middle" font-size="11" fill="#1e2a3a">App</text>
  <rect x="360" y="116" width="240" height="38" rx="6" fill="#eef2f7" stroke="#5a6b80"/><text x="480" y="140" text-anchor="middle" font-size="12" fill="#1e2a3a">Container engine</text>
  <rect x="360" y="160" width="240" height="36" rx="6" fill="#eef2f7" stroke="#5a6b80"/><text x="480" y="183" text-anchor="middle" font-size="12" fill="#1e2a3a">Host OS (shared kernel)</text>
  <rect x="360" y="202" width="240" height="34" rx="6" fill="#dfe5ec" stroke="#5a6b80"/><text x="480" y="224" text-anchor="middle" font-size="12" fill="#1e2a3a">Host hardware</text>
  <text x="480" y="262" text-anchor="middle" font-size="11" fill="#5a6b80">Containers share the host kernel — small, fast to start</text>
  <text x="320" y="316" text-anchor="middle" font-size="12" fill="#1e2a3a">VM = isolate a whole OS &#160;·&#160; Container = package just the app</text>
</svg>
