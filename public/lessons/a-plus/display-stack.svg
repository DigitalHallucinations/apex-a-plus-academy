<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <text x="300" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e2a3a">Inside the lid: display layers</text>
  <rect x="100" y="55" width="400" height="46" rx="10" fill="#e8f0ff" stroke="#2f6fed"/>
  <text x="300" y="83" text-anchor="middle" font-size="14" font-weight="600" fill="#1e2a3a">Digitizer — maps touch to coordinates</text>
  <text x="88" y="83" text-anchor="end" font-size="11" fill="#5a6b80">front</text>
  <rect x="100" y="111" width="400" height="46" rx="10" fill="#e6f7f3" stroke="#0f9d8f"/>
  <text x="300" y="139" text-anchor="middle" font-size="14" font-weight="600" fill="#1e2a3a">LCD / OLED panel — produces the image</text>
  <rect x="100" y="167" width="400" height="46" rx="10" fill="#fff3da" stroke="#c98a00"/>
  <text x="300" y="195" text-anchor="middle" font-size="14" font-weight="600" fill="#1e2a3a">Backlight — illuminates the panel</text>
  <text x="88" y="195" text-anchor="end" font-size="11" fill="#5a6b80">back</text>
  <text x="300" y="248" text-anchor="middle" font-size="12" fill="#5a6b80">Also routed through the hinge: webcam, microphone, and Wi-Fi antennas</text>
  <text x="300" y="275" text-anchor="middle" font-size="12" fill="#1e2a3a">Faint image but dark screen → backlight &#160;·&#160; touch lands off-target → digitizer</text>
</svg>
